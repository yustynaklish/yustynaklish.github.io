<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>my top wikipedia pages</title>
  <style>
    body {
      background-color: #000033;
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='%23ffffff22'/%3E%3C/svg%3E");
      color: #ffffff;
      font-family: "Comic Sans MS", cursive;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #ff99cc;
      font-size: 28px;
      text-shadow: 2px 2px #ff00ff, -1px -1px #0000ff;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 180px);
      gap: 20px;
      justify-content: center;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, #1a003a, #003366);
      border: 2px solid #ff66cc;
      border-radius: 8px;
      padding: 16px 10px;
      box-shadow: 0 0 10px #ff00ff88;
    }

    .card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #ff99cc;
      margin-bottom: 10px;
    }

    .card a {
      display: block;
      color: #ccffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      word-break: break-word;
    }

    .card a:hover {
      color: #ff99cc;
      text-decoration: underline;
    }

    .rank {
      font-size: 10px;
      color: #ff99cc;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h1>&#x2764; my top wikipedia pages &#x2764;</h1>
  <div class="grid">

    <div class="card">
      <div class="rank">#1</div>
      <img src="https://en.wikipedia.org/static/favicon/wikipedia.ico" alt="wiki">
      <a href="https://en.wikipedia.org/wiki/Logical_harmony">Logical harmony</a>
    </div>

    <div class="card">
      <div class="rank">#2</div>
      <img src="https://en.wikipedia.org/static/favicon/wikipedia.ico" alt="wiki">
      <a href="https://en.wikipedia.org/wiki/Screw">Screw</a>
    </div>

    <div class="card">
      <div class="rank">#3</div>
      <img src="https://en.wikipedia.org/static/favicon/wikipedia.ico" alt="wiki">
      <a href="https://en.wikipedia.org/wiki/Four_temperaments">Four temperaments</a>
    </div>

  </div>
</body>
</html>
